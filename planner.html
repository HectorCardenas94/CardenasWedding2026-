<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>NEXO Alpha 0.3</title>

    <link rel="stylesheet" href="planner.css">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

</head>

<body>

<!-- ===========================================
SIDEBAR
=========================================== -->

<aside class="sidebar">

    <div class="logo">

        <h1>NEXO</h1>

        <p>Planner Dashboard</p>

    </div>

    <nav>

        <a href="#"
           class="active"
           onclick="showDashboard(event,this)">

            🏠 Dashboard

        </a>

        <a href="#"
           onclick="showFamilies(event,this)">

            👨‍👩‍👧 Families

        </a>

        <a href="#"
           onclick="showInvitations(event,this)">

            💌 Invitations

        </a>

        <a href="#"
           onclick="showWebsite(event,this)">

            🌐 Website

        </a>

        <a href="#"
           onclick="showAnalytics(event,this)">

            📊 Analytics

        </a>

        <a href="#"
           onclick="showSettings(event,this)">

            ⚙️ Settings

        </a>

    </nav>

    <div class="sidebar-footer">

        <strong>NEXO Alpha 0.3</strong>

        <br>

        Planner Workspace

    </div>

</aside>

<!-- ===========================================
MAIN
=========================================== -->

<main class="main">

    <div id="pageContainer">

    </div>

</main>

<!-- ===========================================
MODAL
=========================================== -->

<div
    class="modal-overlay"
    id="modalOverlay">

    <div
        class="modal"
        id="modalContent">

    </div>

</div>

<!-- ===========================================
TOAST
=========================================== -->

<div
    class="toast"
    id="toast">

</div>
<script src="planner.js"></script>
<script src="invitations.js"></script>
</body>

</html>
