<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hector & Laura | RSVP</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<div id="progress" class="progress">

<div class="step active">
<div class="circle">1</div>
<span>Find</span>
</div>

<div class="line"></div>

<div class="step">
<div class="circle">2</div>
<span>Guests</span>
</div>

<div class="line"></div>

<div class="step">
<div class="circle">3</div>
<span>Message</span>
</div>

<div class="line"></div>

<div class="step">
<div class="circle">4</div>
<span>Done</span>
</div>

</div>

    <div class="top-flower">✿</div>

<p class="small-title">
    THE WEDDING OF
</p>

    <h1>
        Hector
        <span>&</span>
        Laura
    </h1>

    <p class="subtitle">
        Kindly RSVP
    </p>

    <p class="description">
        We are so excited to celebrate our special day with you.
        Please enter the first name this invitation was addressed to.
    </p>

    <input
        id="guestSearch"
        type="text"
        placeholder="First Name">

    <button onclick="findGuest()">
        Continue
    </button>

<div class="bottom-flower">❦</div>

</div>

<script src="script.js"></script>

</body>
</html>
